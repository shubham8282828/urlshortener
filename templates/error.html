<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error — LinkFlow</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <div class="orb orb-2"></div>

  <div class="page">

      <div class="brand" style="justify-content:center">
        <div class="brand-icon">⚡</div>
        <div><div class="brand-name">LinkFlow</div></div>
      </div>

      <div style="font-size:3rem;margin:1rem 0">⚠️</div>

      <h2 style="color:var(--danger)">Something went wrong</h2>
      <p class="sub" style="margin-top:0.5rem">{{ message }}</p>

      <a href="/" class="btn btn-ghost" style="margin-top:1rem;text-decoration:none">← Back to Home</a>

    </div>
  </div>

</html>
